name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy pygame-stubs
      - run: mypy core/ systems/ scenes/ player/ enemies/ --ignore-missing-imports

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pygame>=2.6.0 pytest
          # headless display for pygame
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
      - name: Run tests
        run: xvfb-run -a pytest -x -q --tb=short -m "not slow"
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
