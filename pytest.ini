# pytest 配置文件

[tool:pytest]
# 测试目录
testpaths = tests

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试

# Python 文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 最小 Python 版本
minversion = 6.0
